<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>Facebook – log in or sign up</title>
</head>
<body class="bg-gray-100">
    <div class="container mt-48 flex mx-auto items-center justify-center relative">
        <div class="left w-1/3 mx-14">
        <img class="w-80" src="facebook.svg" alt="">
        <p class="text-3xl mx-8">Facebook helps you connect and share with the people in your life.</p>
        </div>
        <div class="right flex flex-col bg-white p-8 rounded-xl  w-1/4 text-lg">
         <input class="px-4 h-12 my-2  border border-1 border-gray-200 outline-blue-600" type="text" placeholder="Email address or Phone number">
         <input class="px-4 h-12 my-2  border border-1 border-gray-200 outline-blue-600" type="password" placeholder="Password">
         <button class="bg-blue-600 text-white my-2 py-3 rounded-md font-bold hover:bg-blue-700">Log in</button>
         <span class="text-blue-600 text-center text-sm my-2 cursor-pointer hover:underline">Forgotten password?</span>
         <hr class="my-2">
         <button class="bg-green-600 text-white my-2 py-3 rounded-md font-bold w-fit mx-auto px-4 hover:bg-green-700 ">Create new account</button>
         <span class="absolute -bottom-12 text-sm "><span class="font-bold cursor-pointer hover:underline">Create a Page </span>for a celebrity, brand or business.</span>
        </div>
    </div>
</body>
</html>
